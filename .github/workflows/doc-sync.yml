name: doc-sync

on:
  push:
    paths:
      - "src/**"
      - "cent-jours-core/**"
      - "tests/**"
      - "tools/**"
      - ".github/workflows/**"
      - "README.md"
      - "docs/**"
  pull_request:
    paths:
      - "src/**"
      - "cent-jours-core/**"
      - "tests/**"
      - "tools/**"
      - ".github/workflows/**"
      - "README.md"
      - "docs/**"
  workflow_dispatch:

jobs:
  enforce-doc-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify code changes update documentation
        run: python3 tools/check_doc_sync.py
